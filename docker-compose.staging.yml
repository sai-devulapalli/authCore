# Staging — Postgres + Redis, API key auth
# Usage: docker-compose -f docker-compose.staging.yml up
services:
  authplex:
    build: .
    ports:
      - "8080:8080"
    environment:
      AUTHPLEX_ENV: staging
      AUTHPLEX_DATABASE_DSN: postgres://authplex:authplex_staging@postgres:5432/authplex?sslmode=disable
      AUTHPLEX_REDIS_URL: redis://redis:6379
      AUTHPLEX_ADMIN_API_KEY: staging-admin-key-change-me
      AUTHPLEX_ISSUER: http://localhost:8080
      AUTHPLEX_CORS_ORIGINS: http://localhost:5173,http://localhost:3000
      AUTHPLEX_TENANT_MODE: header
      AUTHPLEX_KEY_ROTATION_DAYS: "90"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/health"]
      interval: 10s
      timeout: 5s
      retries: 3

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: authplex
      POSTGRES_USER: authplex
      POSTGRES_PASSWORD: authplex_staging
    ports:
      - "5432:5432"
    volumes:
      - pgdata_staging:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U authplex"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata_staging:
