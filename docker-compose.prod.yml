# Production — Postgres + Redis + nginx TLS, full security
# Usage: docker-compose -f docker-compose.prod.yml --env-file .env.prod up -d
#
# Required .env.prod:
#   DB_PASSWORD=strong-random-password
#   REDIS_PASSWORD=another-strong-password
#   ADMIN_API_KEY=your-admin-key-min-32-chars
#   ENCRYPTION_KEY=hex-encoded-32-byte-key
#   ISSUER=https://auth.myapp.com
#   CORS_ORIGINS=https://myapp.com,https://admin.myapp.com
#   SMTP_HOST=smtp.sendgrid.net
#   SMTP_USERNAME=apikey
#   SMTP_PASSWORD=SG.xxxxx
#   SMTP_FROM=noreply@myapp.com
#   SMS_ACCOUNT_ID=ACxxxxx (optional)
#   SMS_AUTH_TOKEN=xxxxx (optional)
#   SMS_FROM_NUMBER=+1234567890 (optional)

services:
  authplex:
    image: authplex:latest
    build: .
    ports:
      - "8080:8080"
    environment:
      AUTHPLEX_ENV: production
      AUTHPLEX_HTTP_PORT: 8080
      AUTHPLEX_DATABASE_DSN: postgres://authplex:${DB_PASSWORD}@postgres:5432/authplex?sslmode=require
      AUTHPLEX_REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379
      AUTHPLEX_ADMIN_API_KEY: ${ADMIN_API_KEY}
      AUTHPLEX_ENCRYPTION_KEY: ${ENCRYPTION_KEY}
      AUTHPLEX_ISSUER: ${ISSUER}
      AUTHPLEX_CORS_ORIGINS: ${CORS_ORIGINS}
      AUTHPLEX_TENANT_MODE: header
      AUTHPLEX_KEY_ROTATION_DAYS: "90"
      AUTHPLEX_SMTP_HOST: ${SMTP_HOST:-}
      AUTHPLEX_SMTP_PORT: "587"
      AUTHPLEX_SMTP_USERNAME: ${SMTP_USERNAME:-}
      AUTHPLEX_SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      AUTHPLEX_SMTP_FROM: ${SMTP_FROM:-noreply@authplex.local}
      AUTHPLEX_SMS_PROVIDER: ${SMS_PROVIDER:-}
      AUTHPLEX_SMS_ACCOUNT_ID: ${SMS_ACCOUNT_ID:-}
      AUTHPLEX_SMS_AUTH_TOKEN: ${SMS_AUTH_TOKEN:-}
      AUTHPLEX_SMS_FROM_NUMBER: ${SMS_FROM_NUMBER:-}
      AUTHPLEX_WEBAUTHN_RP_ID: ${WEBAUTHN_RP_ID:-localhost}
      AUTHPLEX_WEBAUTHN_RP_NAME: ${WEBAUTHN_RP_NAME:-AuthPlex}
      AUTHPLEX_WEBAUTHN_RP_ORIGINS: ${WEBAUTHN_RP_ORIGINS:-http://localhost:8080}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: always
    deploy:
      replicas: 2
      resources:
        limits:
          memory: 256M
          cpus: '0.5'
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/health"]
      interval: 10s
      timeout: 5s
      retries: 3

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: authplex
      POSTGRES_USER: authplex
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - pgdata_prod:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U authplex"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: always
    deploy:
      resources:
        limits:
          memory: 512M

  redis:
    image: redis:7-alpine
    command: redis-server --requirepass ${REDIS_PASSWORD}
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: always
    deploy:
      resources:
        limits:
          memory: 128M

  nginx:
    image: nginx:alpine
    ports:
      - "443:443"
      - "80:80"
    volumes:
      - ./nginx.prod.conf:/etc/nginx/conf.d/default.conf:ro
      - ./certs:/etc/nginx/certs:ro
    depends_on:
      authplex:
        condition: service_healthy
    restart: always

volumes:
  pgdata_prod:
